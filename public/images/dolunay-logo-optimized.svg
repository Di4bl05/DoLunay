<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCA5A5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Luna con cráteres -->
  <circle cx="30" cy="30" r="22" fill="url(#moonGradient)"/>
  <circle cx="24" cy="22" r="4" fill="#FEF3C7" opacity="0.6"/>
  <circle cx="35" cy="28" r="3" fill="#FEF3C7" opacity="0.5"/>
  <circle cx="28" cy="35" r="2.5" fill="#FEF3C7" opacity="0.4"/>
  <circle cx="37" cy="35" r="2" fill="#FEF3C7" opacity="0.5"/>
  
  <!-- Brillo lunar -->
  <path d="M 20 18 Q 22 16, 26 16 Q 30 16, 32 18" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Estrellas alrededor -->
  <path d="M 48 12 L 49 14 L 51 15 L 49 16 L 48 18 L 47 16 L 45 15 L 47 14 Z" fill="#FBBF24"/>
  <path d="M 52 30 L 53 31 L 54 32 L 53 33 L 52 34 L 51 33 L 50 32 L 51 31 Z" fill="#FCD34D"/>
  <path d="M 48 45 L 49 46 L 50 47 L 49 48 L 48 49 L 47 48 L 46 47 L 47 46 Z" fill="#FCA5A5"/>
  
  <!-- Texto DOLUNAY -->
  <text x="65" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#textGradient)">
    Dolunay
  </text>
  
  <!-- Subtítulo o eslogan pequeño -->
  <text x="67" y="50" font-family="Arial, sans-serif" font-size="8" fill="#FCD34D" opacity="0.9">
    LUNA LLENA
  </text>
</svg>
